name: smoke_test
description: Minimal config for rapid correctness verification

audio:
  sample_rate: 16000
  mono: true
  crop_duration_sec: 2.0
  max_duration_sec: 4.0
  normalize: true

data:
  split: train
  num_workers: 0
  prefetch_factor: 2

model:
  frontend: xlsr_300m
  backend: aasist
  freeze_frontend: true
  layer_weights: false
  hidden_dim: 32
  num_classes: 2

training:
  epochs: 2
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.0
  warmup_steps: 0
  grad_clip: 1.0
  grad_accumulation: 1
  mixed_precision: false
  seed: 42
  augmentation: none
  early_stopping_patience: 10

evaluation:
  multi_crop: false
  aggregation: mean
  compute_bootstrap: false
