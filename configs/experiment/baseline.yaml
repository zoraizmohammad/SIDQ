name: baseline_xlsr_aasist
description: Official-style XLS-R 300M + AASIST baseline

audio:
  sample_rate: 16000
  mono: true
  crop_duration_sec: 4.0
  max_duration_sec: 20.0
  normalize: true

data:
  split: train
  num_workers: 4
  prefetch_factor: 2

model:
  frontend: xlsr_300m
  backend: aasist
  frontend_checkpoint: facebook/wav2vec2-xls-r-300m
  freeze_frontend: true
  layer_weights: false
  hidden_dim: 160
  num_classes: 2

training:
  epochs: 30
  batch_size: 16
  learning_rate: 0.0001
  frontend_lr: null
  weight_decay: 0.0001
  warmup_steps: 1000
  grad_clip: 1.0
  grad_accumulation: 1
  mixed_precision: true
  seed: 42
  augmentation: none
  early_stopping_patience: 5

evaluation:
  multi_crop: false
  aggregation: mean
  compute_bootstrap: false
